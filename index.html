<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איפוס סיסמה</title>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0d0d14;
      --paper: #f8f6f0;
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --muted: #8b8680;
      --border: #d9d4c7;
      --success: #2d7a4f;
      --error: #a63228;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--paper);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Geometric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 90%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 10%, rgba(13,13,20,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Decorative lines */
    .bg-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-lines::before {
      content: '';
      position: absolute;
      top: -10%;
      right: -5%;
      width: 55%;
      height: 120%;
      border-right: 1px solid rgba(201,168,76,0.15);
      border-left: 1px solid rgba(201,168,76,0.08);
      transform: skewX(-8deg);
    }
    .bg-lines::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.3;
    }

    /* Corner ornaments */
    .ornament {
      position: fixed;
      width: 120px;
      height: 120px;
      pointer-events: none;
      opacity: 0.18;
    }
    .ornament-tl { top: 24px; right: 24px; }
    .ornament-br { bottom: 24px; left: 24px; transform: rotate(180deg); }

    .card-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 24px;
      animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top label */
    .label-top {
      text-align: center;
      font-family: 'Heebo', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      animation: fade-in 0.6s 0.3s forwards;
    }

    @keyframes fade-in {
      to { opacity: 1; }
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 44px 40px 40px;
      position: relative;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 32px rgba(0,0,0,0.07),
        0 32px 64px rgba(0,0,0,0.04);
    }

    /* Gold top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 40%, var(--gold-light) 60%, transparent 100%);
    }

    /* Inner corner detail */
    .card::after {
      content: '';
      position: absolute;
      top: 12px; right: 12px;
      width: 24px; height: 24px;
      border-top: 1px solid var(--gold);
      border-right: 1px solid var(--gold);
      opacity: 0.5;
    }

    .card-inner-corner {
      position: absolute;
      bottom: 12px; left: 12px;
      width: 24px; height: 24px;
      border-bottom: 1px solid var(--gold);
      border-left: 1px solid var(--gold);
      opacity: 0.5;
    }

    /* Icon */
    .icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .icon-circle::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      opacity: 0.4;
    }

    .icon-circle svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: var(--gold);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 700;
      font-size: 26px;
      color: var(--ink);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* Inputs */
    .field {
      margin-bottom: 16px;
      position: relative;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field-inner {
      position: relative;
    }

    .field input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--gold);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .field input:focus ~ .field-icon,
    .field:focus-within .field-icon {
      color: var(--gold);
    }

    .field-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Strength bar */
    .strength-wrap {
      margin-top: 6px;
      display: flex;
      gap: 4px;
      height: 3px;
    }
    .strength-seg {
      flex: 1;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.3s;
    }
    .strength-seg.on-1 { background: #a63228; }
    .strength-seg.on-2 { background: #c9883a; }
    .strength-seg.on-3 { background: #c9a84c; }
    .strength-seg.on-4 { background: var(--success); }

    /* Error message */
    .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 10px;
      min-height: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .error-msg.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .error-msg::before {
      content: '—';
      color: var(--gold);
      font-weight: 700;
    }

    /* Button */
    button#btn {
      width: 100%;
      padding: 15px;
      background: var(--ink);
      color: #fff;
      border: 1px solid var(--ink);
      border-radius: 2px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 24px;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    button#btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.15) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    button#btn:hover:not(:disabled)::before {
      transform: translateX(100%);
    }

    button#btn:hover:not(:disabled) {
      background: #1a1a2e;
      border-color: var(--gold);
    }

    button#btn:disabled {
      background: #aaa8a2;
      border-color: #aaa8a2;
      cursor: not-allowed;
    }

    /* Loading dots */
    .dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      margin-right: 6px;
    }
    .dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #fff;
      animation: dot-pulse 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Success */
    #success-area {
      text-align: center;
      padding: 20px 0;
      display: none;
    }

    .success-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f0f7f3, #e0f2e9);
      border: 1px solid rgba(45,122,79,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes pop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--success);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: draw 0.5s 0.3s ease forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .success-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }

    .success-line {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      margin: 16px auto;
      border-radius: 1px;
    }

    /* Footer note */
    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--border);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <div class="bg-lines"></div>

  <!-- SVG corner ornaments -->
  <svg class="ornament ornament-tl" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <path d="M10,10 L110,10 L110,20 M10,10 L10,110 L20,110" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <circle cx="10" cy="10" r="3" fill="#c9a84c"/>
    <path d="M30,10 L30,30 L10,30" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  </svg>
  <svg class="ornament ornament-br" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <path d="M10,10 L110,10 L110,20 M10,10 L10,110 L20,110" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <circle cx="10" cy="10" r="3" fill="#c9a84c"/>
    <path d="M30,10 L30,30 L10,30" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  </svg>

  <div class="card-wrap">
    <div class="label-top">אבטחת חשבון</div>
    <div class="card">
      <div class="card-inner-corner"></div>

      <div class="icon-wrap">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <h1>איפוס סיסמה</h1>
      <p class="subtitle">בחר סיסמה חדשה ומאובטחת<br>לכניסה לחשבונך</p>

      <div class="divider"><span>הכנסת פרטים</span></div>

      <div id="form-area">
        <div class="field">
          <label>סיסמה חדשה</label>
          <div class="field-inner">
            <input type="password" id="password" placeholder="לפחות 6 תווים" oninput="updateStrength(this.value)" />
            <span class="field-icon">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            </span>
          </div>
          <div class="strength-wrap" id="strength-bar">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
          </div>
        </div>

        <div class="field">
          <label>אימות סיסמה</label>
          <div class="field-inner">
            <input type="password" id="password2" placeholder="הכנס שוב את הסיסמה" />
            <span class="field-icon">
              <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
          </div>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <button id="btn" onclick="doReset()">אפס סיסמה</button>
      </div>

      <div id="success-area">
        <div class="success-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="success-title">הסיסמה אופסה בהצלחה</div>
        <div class="success-line"></div>
        <p class="success-sub">כעת תוכל להיכנס לחשבונך<br>עם הסיסמה החדשה שלך</p>
      </div>
    </div>
    <div class="footer-note">מאובטח · מוצפן · פרטי</div>
  </div>

  <script>
	
		firebase.initializeApp({
	  apiKey: "AIzaSyBEbaFh_QnBgpWFw7bmmdGUL4GN9zp2luU",
	  authDomain: "budget-bd21a.firebaseapp.com",
	  projectId: "budget-bd21a",
	  storageBucket: "budget-bd21a.firebasestorage.app",
	  messagingSenderId: "372546696795",
	  appId: "1:372546696795:web:6732accf079b64b1ea317e"
	});

    function updateStrength(val) {
      const segs = ['s1','s2','s3','s4'];
      segs.forEach(s => {
        document.getElementById(s).className = 'strength-seg';
      });
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z0-9]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[^a-zA-Z0-9]/.test(val)) score++;
      for (let i = 0; i < score; i++) {
        document.getElementById(segs[i]).classList.add('on-' + score);
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function clearError() {
      const el = document.getElementById('error-msg');
      el.textContent = '';
      el.classList.remove('visible');
    }

    function doReset() {
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      clearError();

      if (!password || password.length < 6) {
        showError('הסיסמה חייבת להכיל לפחות 6 תווים');
        return;
      }
      if (password !== password2) {
        showError('הסיסמאות אינן תואמות');
        return;
      }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> שומר...';

      const params = new URLSearchParams(window.location.search);
      const oobCode = params.get('oobCode');

      firebase.auth().confirmPasswordReset(oobCode, password)
        .then(() => {
          document.getElementById('form-area').style.display = 'none';
          const sa = document.getElementById('success-area');
          sa.style.display = 'block';
        })
        .catch(e => {
          btn.disabled = false;
          btn.innerHTML = 'אפס סיסמה';
          if (e.code === 'auth/expired-action-code') {
            showError('הקישור פג תוקף — בקש קישור חדש מהאפליקציה');
          } else if (e.code === 'auth/invalid-action-code') {
            showError('הקישור אינו תקין — בקש קישור חדש מהאפליקציה');
          } else {
            showError('שגיאה: ' + e.message);
          }
        });
    }
  </script>
</body>
</html>
